services:
  postgres:
    image: postgres:16-alpine
    container_name: unisism-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unisism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unisism}
      POSTGRES_DB: ${POSTGRES_DB:-unisism_ubs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unisism} -d ${POSTGRES_DB:-unisism_ubs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: unisism-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: unisism-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-unisism}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-unisism12345}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    # Opcional — ClamAV demora ~2-5min no primeiro start (baixa assinaturas).
    image: clamav/clamav:latest
    container_name: unisism-clamav
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unisism-backend
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-unisism}:${POSTGRES_PASSWORD:-unisism}@postgres:5432/${POSTGRES_DB:-unisism_ubs}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-unisism-anexos}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-unisism}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-unisism12345}
      S3_FORCE_PATH_STYLE: "true"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      METRICS_ENABLED: "true"
      OUTBOX_ENABLED: "true"
      UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-3333}:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/main/server.js"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  uploads_data:
